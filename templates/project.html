<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Task Manager - Projects</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Task Manager</h2>
            <nav>
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/project" class="nav-link active">Projects</a>
                <a href="#" class="nav-link" id="logoutBtn" style="margin-top: auto; color: var(--danger);">Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div>
                    <h1>Projects & Tasks</h1>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" id="newProjectBtn" style="display: none;">+ New Project</button>
                    <button class="btn btn-primary" id="newTaskBtn">+ New Task</button>
                </div>
            </header>

            <div style="display: flex; gap: 2rem;">
                <!-- Projects List -->
                <div class="card-list" style="flex: 1;">
                    <div class="card-list-header">
                        <h3>Projects</h3>
                    </div>
                    <div id="projectsListContainer">
                        <!-- Projects injected here -->
                    </div>
                </div>

                <!-- Tasks List -->
                <div class="card-list" style="flex: 2;">
                    <div class="card-list-header">
                        <h3 id="currentProjectTitle">All Tasks</h3>
                    </div>
                    <div id="tasksListContainer">
                        <!-- Tasks injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <!-- Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Project</h2>
                <button class="close-btn" id="closeProjectModal">&times;</button>
            </div>
            <form id="projectForm">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="projTitle" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="projDesc" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Create</button>
            </form>
        </div>
    </div>

    <!-- Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Task</h2>
                <button class="close-btn" id="closeTaskModal">&times;</button>
            </div>
            <form id="taskForm">
                <div class="form-group">
                    <label>Project</label>
                    <select id="taskProject" class="form-control" required></select>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="taskTitle" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="taskStatus" class="form-control">
                        <option value="To Do">To Do</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done">Done</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Assign To</label>
                    <select id="taskAssignee" class="form-control"></select>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="taskDate" class="form-control">
                </div>
                <button type="submit" class="btn btn-primary">Create Task</button>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            fetchProjectsAndTasks();
        });
    </script>
</body>
</html>
